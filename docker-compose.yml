version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: contentpush-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: contentpush
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: contentpush-redis
    ports:
      - "6379:6379"

volumes:
  pg_data:
